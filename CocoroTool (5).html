<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CocoroTool</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c1018;
  --s1:       #141921;
  --s2:       #1b2230;
  --s3:       #222b3a;
  --bd:       #28334a;
  --tx:       #dde3f0;
  --mu:       #6b7a96;
  --ok:       #6ec97b;
  --wn:       #f0b95a;
  --dg:       #e95f5f;
  --pu:       #c084e0;
  --bl:       #82c4f8;
  --r: 10px;
  --c-skin:   #4dbdac;
  --c-circ:   #7986cb;
  --c-emg:    #e07b5a;
  --c-cons:   #9b8ecf;
  --c-excr:   #6aab8e;
  --c-eol:    #b07cae;
  --c-stoma:  #d4956a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;padding-bottom:110px;font-size:15px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(12,16,24,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:12px 16px 10px}
.hdr h1{font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;letter-spacing:.06em}
.hdr p{font-size:.62rem;color:var(--mu);margin-top:1px}

.main{padding:12px 12px 0}

/* CATEGORY */
.cat{margin-bottom:10px;border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;transition:border-color .2s}
.cat.open{border-color:var(--cc,var(--bd))}

.cat-hdr{display:flex;align-items:center;gap:11px;padding:13px 15px;background:var(--s1);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .12s}
.cat-hdr:active{background:var(--s2)}

.cat-ico{width:36px;height:36px;border-radius:9px;background:color-mix(in srgb,var(--cc) 16%,transparent);border:1px solid color-mix(in srgb,var(--cc) 35%,transparent);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.cat-inf{flex:1;min-width:0}
.cat-ttl{font-size:.9rem;font-weight:700;color:var(--cc)}
.cat-sub{font-size:.65rem;color:var(--mu);margin-top:2px}
.cat-badges{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;max-width:120px}
.cbadge{font-size:.58rem;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;background:color-mix(in srgb,var(--cc) 13%,transparent);color:var(--cc);border:1px solid color-mix(in srgb,var(--cc) 28%,transparent);white-space:nowrap}
.chev{font-size:.8rem;color:var(--mu);transition:transform .22s;margin-left:4px;flex-shrink:0}
.cat.open .chev{transform:rotate(180deg)}

.cat-body{display:none;background:var(--s2);border-top:1px solid var(--bd)}
.cat.open .cat-body{display:block}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 14px;font-size:.74rem;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:color .14s,border-color .14s;-webkit-tap-highlight-color:transparent}
.tab.on{color:var(--cc);border-bottom-color:var(--cc)}

.pane{display:none;padding:11px 11px 14px}
.pane.on{display:block}

/* SECTION BOX */
.sb{background:var(--s1);border:1px solid var(--bd);border-radius:9px;margin-bottom:8px;overflow:hidden;transition:border-color .18s}
.sb.sel{border-color:color-mix(in srgb,var(--cc) 55%,transparent)}
.sh{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s3)}
.sk{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:500;color:var(--cc);min-width:16px}
.sn{font-size:.8rem;font-weight:500;flex:1}
.se{font-size:.62rem;color:var(--mu);margin-left:4px}
.sv{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;color:var(--ok);min-width:36px;text-align:right}
.hint{padding:5px 12px 0;font-size:.63rem;color:var(--mu);line-height:1.5;background:var(--s3)}
.ncbadge{font-size:.56rem;padding:1px 5px;border-radius:3px;margin-left:5px;background:rgba(240,185,90,.1);color:var(--wn);border:1px solid rgba(240,185,90,.28)}

/* OPTIONS */
.opts{padding:7px 8px 9px;display:flex;flex-direction:column;gap:4px}
.opt{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border-radius:7px;border:1px solid transparent;cursor:pointer;transition:background .1s,border-color .1s;-webkit-tap-highlight-color:transparent}
.opt:active{background:var(--s3)}
.opt.c0{background:rgba(110,201,123,.08);border-color:rgba(110,201,123,.32)}
.opt.c1{background:color-mix(in srgb,var(--cc) 7%,transparent);border-color:color-mix(in srgb,var(--cc) 32%,transparent)}
.opt.cw{background:rgba(240,185,90,.07);border-color:rgba(240,185,90,.30)}
.opt.cd{background:rgba(233,95,95,.07);border-color:rgba(233,95,95,.28)}
.opt.cp{background:rgba(192,132,224,.08);border-color:rgba(192,132,224,.32)}

.rdot{width:14px;height:14px;border-radius:50%;border:2px solid var(--mu);flex-shrink:0;margin-top:3px;position:relative;transition:all .13s}
.opt.c0 .rdot,.opt.c1 .rdot,.opt.cw .rdot,.opt.cd .rdot,.opt.cp .rdot{border-color:var(--cc);background:var(--cc)}
.opt.c0 .rdot::after,.opt.c1 .rdot::after,.opt.cw .rdot::after,.opt.cd .rdot::after,.opt.cp .rdot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:var(--bg)}

.olbl{font-family:'DM Mono',monospace;font-size:.74rem;font-weight:500;min-width:40px;flex-shrink:0;margin-top:2px;color:var(--wn)}
.olbl.ok{color:var(--ok)}.olbl.hv{color:var(--dg)}.olbl.pu{color:var(--pu)}.olbl.bl{color:var(--bl)}
.otx{font-size:.76rem;line-height:1.52}
.osub{font-size:.65rem;color:var(--mu);margin-top:2px;font-style:italic}
.otag{display:inline-block;font-size:.58rem;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;font-style:normal}
.tnew{background:rgba(192,132,224,.14);color:var(--pu);border:1px solid rgba(192,132,224,.32)}
.tfast{background:rgba(130,196,248,.14);color:var(--bl);border:1px solid rgba(130,196,248,.32)}
.tslow{background:rgba(240,185,90,.14);color:var(--wn);border:1px solid rgba(240,185,90,.30)}

/* TOTAL BAR */
.tbar{background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.tnum{font-family:'DM Mono',monospace;font-size:1.7rem;font-weight:500;min-width:50px}
.trisk{font-size:.8rem;font-weight:700}
.trsub{font-size:.63rem;color:var(--mu);margin-top:2px}

/* TIMER */
.tmr{background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.tdisp{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:500;min-width:56px;color:var(--c-circ)}
.tdisp.run{color:var(--wn)}.tdisp.done{color:var(--ok)}
.tinf{flex:1;font-size:.68rem;color:var(--mu);line-height:1.5}
.tinf strong{color:var(--tx);display:block;margin-bottom:2px}
.tbtns{display:flex;flex-direction:column;gap:5px}
.tbtn{padding:7px 10px;border-radius:6px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tbtn-go{background:var(--c-circ);color:#fff}
.tbtn-rs{background:var(--s1);color:var(--mu);border:1px solid var(--bd)}

/* LR / SITE */
.lrtgl{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--bd);margin-bottom:10px}
.lrbtn{flex:1;padding:8px;background:var(--s3);color:var(--mu);border:none;font-family:'Noto Sans JP',sans-serif;font-size:.78rem;cursor:pointer;transition:all .13s;-webkit-tap-highlight-color:transparent}
.lrbtn:first-child{border-right:1px solid var(--bd)}
.lrbtn.on{background:color-mix(in srgb,var(--c-circ) 16%,transparent);color:var(--c-circ);font-weight:700}

.sitebar{display:flex;border-bottom:1px solid var(--bd);margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.sitebar::-webkit-scrollbar{display:none}
.spill{flex-shrink:0;padding:9px 14px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--mu);font-size:.76rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:color .13s,border-color .13s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.spill.on{color:var(--c-circ);border-bottom-color:var(--c-circ);font-weight:700}

/* OPQRST / SAMPLE — テキスト入力式 */
.qitem{background:var(--s1);border:1px solid var(--bd);border-radius:9px;margin-bottom:8px;overflow:hidden;transition:border-color .18s}
.qitem.filled{border-color:color-mix(in srgb,var(--cc) 50%,transparent)}
.qhdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s3)}
.qkey{font-family:'DM Mono',monospace;font-size:1rem;font-weight:700;color:var(--cc);min-width:22px}
.qname{font-size:.82rem;font-weight:700;flex:1}
.qeng{font-size:.62rem;color:var(--mu);margin-left:4px}
.qbody{padding:8px 10px 10px}
.qhint{font-size:.68rem;color:var(--mu);line-height:1.55;margin-bottom:6px}
.qexamples{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.qex{font-size:.66rem;padding:3px 8px;border-radius:5px;background:color-mix(in srgb,var(--cc) 10%,transparent);color:var(--cc);border:1px solid color-mix(in srgb,var(--cc) 24%,transparent);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.qex:active{background:color-mix(in srgb,var(--cc) 22%,transparent)}
.qinp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:8px 10px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:.8rem;resize:none;outline:none;transition:border-color .14s;line-height:1.5}
.qinp:focus{border-color:color-mix(in srgb,var(--cc) 55%,transparent)}
.qinp::placeholder{color:var(--mu)}

/* RESULT BAR */
.rbar{position:fixed;bottom:0;left:0;right:0;background:rgba(20,25,33,.96);backdrop-filter:blur(14px);border-top:1px solid var(--bd);padding:10px 13px 14px;z-index:300;display:none}
.rbar.vis{display:block}
.rinner{display:flex;align-items:center;gap:9px}
.rlbl{font-size:.58rem;color:var(--mu)}
.rscore{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;flex-shrink:0}
.rtw{flex:1;min-width:0}
.rtxt{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--tx);word-break:break-all;line-height:1.5}
.rnote{font-size:.6rem;color:var(--mu);margin-top:1px}
.rbtns{display:flex;gap:5px;flex-shrink:0}
.bcopy{padding:9px 13px;border-radius:7px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .16s,transform .1s;-webkit-tap-highlight-color:transparent}
.bcopy:active{transform:scale(.95)}
.bcopy.done{background:var(--ok)!important;color:#0c1018}
.brst{padding:9px 9px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'Noto Sans JP',sans-serif;font-size:.76rem;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.brst:active{color:var(--dg);border-color:var(--dg)}

/* ══ SPLASH ══ */
#splash{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  transition:opacity .5s ease, visibility .5s ease;
}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}

.sp-bg{
  position:absolute;inset:0;overflow:hidden;
}
.sp-ring{
  position:absolute;border-radius:50%;border:1px solid;
  animation:ringpulse 4s ease-in-out infinite;
}
.sp-ring:nth-child(1){width:340px;height:340px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(77,189,172,.12);animation-delay:0s}
.sp-ring:nth-child(2){width:480px;height:480px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(77,189,172,.07);animation-delay:.6s}
.sp-ring:nth-child(3){width:620px;height:620px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(121,134,203,.05);animation-delay:1.2s}
@keyframes ringpulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.03)}}

.sp-dot{
  position:absolute;border-radius:50%;
  animation:dotfloat 6s ease-in-out infinite;
}
.sp-dot:nth-child(4){width:4px;height:4px;background:rgba(77,189,172,.5);top:28%;left:30%;animation-delay:0s}
.sp-dot:nth-child(5){width:3px;height:3px;background:rgba(121,134,203,.5);top:65%;left:72%;animation-delay:1s}
.sp-dot:nth-child(6){width:5px;height:5px;background:rgba(77,189,172,.3);top:42%;left:80%;animation-delay:2s}
.sp-dot:nth-child(7){width:2px;height:2px;background:rgba(240,185,90,.4);top:72%;left:22%;animation-delay:1.5s}
.sp-dot:nth-child(8){width:3px;height:3px;background:rgba(121,134,203,.4);top:20%;left:65%;animation-delay:2.5s}
@keyframes dotfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.sp-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  animation:fadein .8s ease both;
}
@keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.sp-logo{
  width:110px;height:110px;
  border-radius:50%;
  background:transparent;
  border:none;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  filter:drop-shadow(0 0 16px rgba(255,180,200,.4)) drop-shadow(0 4px 14px rgba(0,0,0,.25));
  animation:logoglow 3s ease-in-out infinite;
}
@keyframes logoglow{0%,100%{box-shadow:0 0 32px rgba(77,189,172,.12),0 0 60px rgba(121,134,203,.08)}50%{box-shadow:0 0 42px rgba(77,189,172,.22),0 0 80px rgba(121,134,203,.14)}}

.sp-group{
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:1.35rem;
  font-weight:700;
  letter-spacing:.15em;
  color:var(--tx);
  margin-bottom:8px;
  animation:fadein .8s .1s ease both;
}
.sp-title{
  font-family:'DM Mono',monospace;
  font-size:2.6rem;
  font-weight:500;
  letter-spacing:.06em;
  background:linear-gradient(135deg,#4dbdac,#7986cb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;
  margin-bottom:6px;
  animation:fadein .8s .2s ease both;
}
.sp-sub{
  font-size:.72rem;
  font-weight:300;
  letter-spacing:.18em;
  color:var(--mu);
  animation:fadein .8s .3s ease both;
}

.sp-line{
  width:48px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(77,189,172,.6),transparent);
  margin:18px 0;
  animation:fadein .8s .35s ease both;
}

.sp-scales{
  display:flex;gap:8px;
  animation:fadein .8s .45s ease both;
}
.sp-stag{
  font-size:.58rem;
  letter-spacing:.1em;
  padding:3px 9px;
  border-radius:20px;
  border:1px solid rgba(77,189,172,.2);
  color:rgba(77,189,172,.7);
  font-family:'DM Mono',monospace;
}

.sp-tap{
  margin-top:40px;
  font-size:.7rem;
  letter-spacing:.2em;
  color:rgba(77,189,172,.6);
  font-family:'DM Mono',monospace;
  animation:tapblink 1.8s ease-in-out infinite, fadein .8s .55s ease both;
}
@keyframes tapblink{0%,100%{opacity:.4}50%{opacity:1}}

</style>
</head>

<!-- 深さ評価ガイド モーダル -->
<div id="depth-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(8,11,16,.88);backdrop-filter:blur(6px);overflow-y:auto;-webkit-overflow-scrolling:touch" onclick="if(event.target===this)hideDepthGuide()">
  <div style="max-width:540px;margin:0 auto;min-height:100%;padding:14px 12px 40px">
    <div style="display:flex;align-items:center;gap:8px;position:sticky;top:0;background:linear-gradient(180deg,rgba(8,11,16,.98),rgba(8,11,16,.0));padding:8px 2px 14px;z-index:2">
      <div style="font-size:1.05rem;font-weight:700;color:var(--c-skin);flex:1">📐 DESIGN-R® 深さ(D)評価ガイド</div>
      <button onclick="hideDepthGuide()" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:1.1rem;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent">✕</button>
    </div>
    <div id="depth-modal-body"></div>
  </div>
</div>

<script>
'use strict';
// ── グローバル ──────────────────────────────
let gCopyFn = null, gResetFn = null;
const $ = id => document.getElementById(id);

// ── 日付ユーティリティ ───────────────────────
function fmtDate(d) {
  return (d.getMonth()+1) + '/' + d.getDate();
}
function today() { return new Date(); }
function nextWeek() { const d = new Date(); d.setDate(d.getDate()+7); return d; }

// copyFnは「結果文字列」を返す。wrapCopy でフォーマットを付与する
let gScaleName = '';
function wrapCopy(scaleName, resultBody) {
  const t = fmtDate(today()), n = fmtDate(nextWeek());
  return `【${scaleName}】評価日付　${t}\n${resultBody}\n次回評価目安　${n}`;
}

function showBar(lbl, score, txt, note, color, scaleName, copyFn, resetFn) {
  gCopyFn = copyFn; gResetFn = resetFn; gScaleName = scaleName;
  $('rlbl').textContent = lbl;
  $('rscore').textContent = score;
  $('rscore').style.color = color;
  $('rtxt').textContent = txt;
  $('rnote').textContent = note || '';
  $('bcopy').style.background = color;
  $('bcopy').style.color = '#0c1018';
  $('rbar').classList.add('vis');
}
function hideBar() { $('rbar').classList.remove('vis'); }

// ══════════════════════════════════════════════
// 深さ(D)評価ガイド モーダル
// ══════════════════════════════════════════════
function showDepthGuide() {
  const body = document.getElementById('depth-modal-body');
  if (body) body.innerHTML = buildDepthGuide();
  const mo = document.getElementById('depth-modal');
  if (mo) mo.style.display = 'block';
  document.body.style.overflow = 'hidden';
}
function hideDepthGuide() {
  const mo = document.getElementById('depth-modal');
  if (mo) mo.style.display = 'none';
  document.body.style.overflow = '';
}

function buildDepthGuide() {
  // 参考図のレイアウトを踏襲したオリジナル断面模式図
  // 層: 表皮(肌)→真皮(ピンク)→脂肪組織(黄)→筋(オレンジ)→骨(白×オレンジ)
  // SVG 1枚あたり viewBox 0 0 140 150

  function section(label, title, drawFn, note, lc, findings) {
    const W = 140, H = 150;
    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">`;
    // 外枠
    svg += `<rect x="1" y="1" width="${W-2}" height="${H-2}" fill="none" stroke="#3a4358" stroke-width="1" rx="4"/>`;
    // ── 基本の層構造 ──
    // 表皮（肌色・波打つ上面）
    svg += `<path d="M4 28 Q20 22 36 28 T68 28 T100 28 T136 28 L136 40 L4 40 Z" fill="#f6d9c8"/>`;
    // 真皮（ピンク）
    svg += `<rect x="4" y="40" width="132" height="26" fill="#ef9a9a"/>`;
    // 脂肪組織（黄）
    svg += `<rect x="4" y="66" width="132" height="30" fill="#ffe082"/>`;
    // 筋（オレンジ）
    svg += `<rect x="4" y="96" width="132" height="22" fill="#ed9b6a"/>`;
    // 骨（オレンジ地に白い骨）
    svg += `<rect x="4" y="118" width="132" height="28" fill="#e8895a"/>`;
    svg += `<ellipse cx="40" cy="132" rx="26" ry="11" fill="#fdf3e0"/>`;
    svg += `<ellipse cx="100" cy="132" rx="26" ry="11" fill="#fdf3e0"/>`;
    svg += `<rect x="58" y="127" width="24" height="10" fill="#fdf3e0"/>`;
    // ── 各段階固有の描画（損傷など） ──
    svg += drawFn();
    svg += `</svg>`;

    return `<div style="background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:10px">
      <div style="display:flex;align-items:stretch">
        <div style="flex:0 0 130px;border-right:1px solid var(--bd)">
          <div style="background:var(--s3);padding:6px 8px;text-align:center">
            <div style="font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:700;color:${lc}">${label}</div>
            <div style="font-size:.6rem;color:var(--tx);line-height:1.3;margin-top:2px;min-height:2.4em">${title}</div>
          </div>
          ${svg}
        </div>
        <div style="flex:1;min-width:0;padding:9px 11px;display:flex;flex-direction:column;gap:6px">
          <div style="font-size:.7rem;color:var(--tx);font-weight:500;line-height:1.5">${note}</div>
          ${findings ? `<div style="font-size:.67rem;color:var(--mu);line-height:1.65;background:var(--s2);border-radius:7px;padding:7px 9px"><span style="color:${lc};font-weight:700;font-size:.62rem">▼ こう見える</span><br>${findings}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  // 損傷の窪み（白く抜く）。bottomY まで到達
  function wound(bottomY, width) {
    const cx = 70, top = 28, w = width || 56;
    return `<path d="M ${cx - w/2} ${top}
      Q ${cx - w/2} ${(top+bottomY)/2} ${cx - w/2 + 6} ${bottomY}
      L ${cx + w/2 - 6} ${bottomY}
      Q ${cx + w/2} ${(top+bottomY)/2} ${cx + w/2} ${top} Z"
      fill="#ffffff" stroke="#d0d4dc" stroke-width="0.8"/>`;
  }

  const items = [
    section('d0', '皮膚損傷・<br>発赤なし',
      () => '', '皮膚に損傷や持続する発赤を認めない。', 'var(--ok)',
      '皮膚は健常で、押しても消える一過性の発赤のみ。表面の傷・色調変化はなく、触れても周囲と同じ硬さ・温度。'),

    section('d1', '持続する<br>発赤',
      () => `<rect x="40" y="28" width="60" height="12" fill="#e57373" opacity="0.75"/>`,
      '圧迫を除去しても消退しない発赤。表皮レベル。', 'var(--ok)',
      '指で押しても白く消えない赤み（消退しない発赤）が境界明瞭に見える。皮膚表面は破れておらず、水疱やびらんはない。黒っぽい皮膚では赤より暗紫色・色素変化として現れることがある。'),

    section('d2', '真皮までの<br>損傷',
      () => wound(58, 60), 'びらん・水疱・浅い潰瘍。損傷が真皮内にとどまる。', 'var(--tx)',
      '浅くえぐれた創で、創底は湿ったピンク〜赤色。水疱（水ぶくれ）やその破れた跡のびらん、薄い潰瘍として見える。脂肪組織（黄色）は見えず、深さは浅い。'),

    section('D3', '皮下組織<br>までの損傷',
      () => wound(94, 64), '潰瘍が皮下脂肪組織に達している。', 'var(--dg)',
      '創縁から落ち込んだ深い潰瘍で、創底に黄色い皮下脂肪組織が見える。赤い肉芽や黄色いスラフ（壊死）が混在することも。筋肉・腱・骨は見えない。ポケット形成が始まることがある。'),

    section('D4', '皮下組織を<br>超える損傷',
      () => wound(116, 50), '皮下組織を超え、筋膜・筋肉・腱などに達する。', 'var(--dg)',
      'さらに深く、創底に白っぽい筋膜や赤褐色の筋肉、白く光る腱が見える。脂肪層を超えており、壊死組織やポケットを伴うことが多い。出血しやすく、感染リスクが高い。'),

    section('D5', '関節腔・体腔<br>に至る損傷',
      () => wound(144, 34), '関節腔や体腔にまで達した最も深い状態。', 'var(--dg)',
      '最も深い段階。創底に骨や関節包、体腔が露出して見える。'),

    section('DDTI', '深部損傷褥瘡<br>(DTI)疑い',
      () => `<rect x="40" y="28" width="60" height="12" fill="#f8bbd0" opacity="0.8"/>`
          + `<ellipse cx="70" cy="80" rx="34" ry="26" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5 4"/>`
          + `<text x="70" y="90" font-size="26" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family="sans-serif">?</text>`,
      '表面は軽症に見えても深部組織の損傷が疑われる（2020年版で追加）。経緯・血液検査・画像等で判断。', 'var(--pu)',
      '皮膚表面は一見浅い発赤や軽い損傷に見えるが、限局した紫色〜暗赤色の変色、血疱、皮膚の硬結・冷感・熱感・疼痛など、深部に損傷を示唆する所見がある。数日で急速に深い潰瘍へ進行することがある。'),

    section('DU', '壊死組織で<br>覆われ判定不能',
      () => `<path d="M40 28 L100 28 L96 46 Q70 56 44 46 Z" fill="#2e2e2e"/>`
          + `<ellipse cx="70" cy="84" rx="34" ry="26" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5 4"/>`
          + `<text x="70" y="94" font-size="26" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family="sans-serif">?</text>`,
      '壊死組織で創底が覆われ深さ判定不能。デブリードマン後に再評価。', 'var(--dg)',
      '創全体が黒色〜黄褐色の硬い壊死組織（エスカー）や厚いスラフで覆われ、創底が見えないため深さを判定できない。壊死組織を除去（デブリードマン）して初めて本当の深さがわかる。'),
  ];

  const intro = `<div style="background:color-mix(in srgb,var(--c-skin) 9%,var(--s2));border:1px solid color-mix(in srgb,var(--c-skin) 25%,transparent);border-radius:10px;padding:11px 13px;margin-bottom:12px">
    <div style="font-size:.74rem;color:var(--tx);line-height:1.7">
      創内の<strong style="color:var(--c-skin)">一番深い部分</strong>で評価します。創底が見えない場合は判定不能(DU)。<br>
      改善に伴い創底が浅くなった場合は、相応する深さで評価します。<br>
      <span style="color:var(--wn);font-size:.68rem">※深さ(D)の点数は合計に含めません。</span>
    </div>
  </div>`;

  const legend = `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:0 2px;font-size:.64rem;color:var(--mu)">
    <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:11px;height:11px;background:#f6d9c8;border-radius:2px;display:inline-block"></span>表皮</span>
    <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:11px;height:11px;background:#ef9a9a;border-radius:2px;display:inline-block"></span>真皮</span>
    <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:11px;height:11px;background:#ffe082;border-radius:2px;display:inline-block"></span>脂肪組織</span>
    <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:11px;height:11px;background:#ed9b6a;border-radius:2px;display:inline-block"></span>筋</span>
    <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:11px;height:11px;background:#e8895a;border-radius:2px;display:inline-block"></span>骨</span>
  </div>`;

  const grid = `<div>${items.join('')}</div>
    <div style="font-size:.62rem;color:var(--mu);margin-top:12px;padding:0 2px;line-height:1.6">
      ※層構造と損傷到達深さの目安を示したオリジナル模式図です。実際の評価では創底の組織を直接観察してください。
    </div>`;

  return intro + legend + grid;
}

function doReset() { if (gResetFn) gResetFn(); }
function doCopy() {
  if (!gCopyFn) return;
  const result = gCopyFn();
  const t = wrapCopy(gScaleName, result);
  navigator.clipboard.writeText(t).then(() => {
    $('bcopy').textContent = '✓ コピー済';
    $('bcopy').classList.add('done');
    setTimeout(() => { $('bcopy').textContent = 'コピー'; $('bcopy').classList.remove('done'); }, 2000);
  });
}

const catOpen = {}, activeTab = {};
const SCALE_NAMES = { designr:'DESIGN-R®2020', oh:'OHスケール', edema:'浮腫スコア', dehydration:'脱水身体所見', nyha:'NYHA分類', tee:'TEE (Harris-Benedict)', insensible:'不感蒸泄', jcs:'JCS', gcs:'GCS', rass:'RASS', bristol:'ブリストルスケール', hematuria:'血尿スケール', ppi:'PPI', cpot:'CPOT', spa:'SPAツール', opqrst:'OPQRST', sample:'SAMPLE', cpss:'CPSS（脳卒中スクリーニング）', lvo:'LVO観察（主幹動脈閉塞）' };

function toggleCat(id) {
  catOpen[id] = !catOpen[id];
  const el = $('cat-'+id);
  el.classList.toggle('open', catOpen[id]);
  if (catOpen[id]) { if (!activeTab[id]) activeTab[id] = CATS.find(c=>c.id===id).scales[0]; initPanes(id); }
}
function switchTab(cid, sid) {
  activeTab[cid] = sid;
  CATS.find(c=>c.id===cid).scales.forEach(s => {
    $('pane-'+s)?.classList.toggle('on', s===sid);
    $('tab-'+s)?.classList.toggle('on', s===sid);
  });
  hideBar();
}
function initPanes(cid) {
  const cat = CATS.find(c=>c.id===cid);
  cat.scales.forEach(sid => {
    const p = $('pane-'+sid); if (!p) return;
    if (sid==='designr') p.innerHTML = buildDR();
    else if (sid==='oh') p.innerHTML = buildOH();
    else if (sid==='edema') p.innerHTML = buildEdema();
    else if (sid==='dehydration') p.innerHTML = buildDehydration();
    else if (sid==='nyha') p.innerHTML = buildNYHA();
    else if (sid==='tee') p.innerHTML = buildTEE();
    else if (sid==='insensible') p.innerHTML = buildInsensible();
    else if (sid==='jcs') p.innerHTML = buildJCS();
    else if (sid==='gcs') p.innerHTML = buildGCS();
    else if (sid==='rass') p.innerHTML = buildRASS();
    else if (sid==='bristol') p.innerHTML = buildBristol();
    else if (sid==='hematuria') p.innerHTML = buildHematuria();
    else if (sid==='ppi') p.innerHTML = buildPPI();
    else if (sid==='cpot') p.innerHTML = buildCPOT();
    else if (sid==='spa') p.innerHTML = buildSPA();
    else if (sid==='opqrst') p.innerHTML = buildOPQRST();
    else if (sid==='sample') p.innerHTML = buildSAMPLE();
    else if (sid==='cpss') p.innerHTML = buildCPSS();
    else if (sid==='lvo') p.innerHTML = buildLVO();
    p.classList.toggle('on', sid===activeTab[cid]);
  });
}

    {v:24,lb:'P24',lc:'hv',tx:'36cm²以上'},
  ]},
];
const drSt = {}; DR.forEach(it => drSt[it.k] = null);

function drSel(el) {
  const k = el.dataset.k;
  const raw = el.dataset.v;
  // 数値変換できるものは数値、それ以外は文字列
  const v = (!isNaN(Number(raw)) && raw !== '') ? Number(raw) : raw;
  drSt[k] = (drSt[k] === v) ? null : v;
  rebuildDR();
}

function drOptCls(opt, sel) {
  if (!sel) return '';
  if (opt.lc==='ok') return 'c0';
  if (opt.lc==='pu') return 'cp';
  if (opt.lc==='hv') return 'cd';
  return 'c1';
}

function drResult() {
  let total = 0; const parts = [];
  DR.forEach(it => {
    const v = drSt[it.k];
    if (v === null) { parts.push(it.k.toLowerCase()+'○'); return; }
    const o = it.o.find(x => x.v === v);
    parts.push(o.lb);
    if (!it.nc) { const o2 = it.o.find(x=>x.v===v); if(o2) total += (typeof o2.score!=='undefined' ? o2.score : (typeof v==='number' ? v : 0)); }
  });
  return { parts, total };
}

function rebuildDR() {
  const p = $('pane-designr'); if (!p) return;
  p.innerHTML = buildDR();
  const { parts, total } = drResult();
  const txt = parts.join('-') + '：' + total + '点';
  const dv = drSt['D'] !== null ? DR[0].o.find(x=>x.v===drSt['D']).lb : null;
  // 重症度の目安（深さD以外の合計点で判断）
  let sev = '';
  const anySel = DR.some(it => drSt[it.k] !== null);
  if (anySel) {
    if (total >= 19) sev = '重症の目安（合計が高いほど治癒に時間を要する）';
    else if (total >= 9) sev = '中等症の目安';
    else sev = '軽症の目安';
  }
  const note = [dv ? '深さ：'+dv+'（合計に含めない）' : '', sev].filter(Boolean).join(' ｜ ');
  showBar('合計', total+'点', txt, note, 'var(--c-skin)',
    'DESIGN-R®2020',
    () => txt,
    () => { DR.forEach(it => drSt[it.k]=null); rebuildDR(); hideBar(); }
  );
}

function buildDR() {
  return DR.map(it => {
    const sv = drSt[it.k];
    const disp = sv!==null ? (it.nc ? it.o.find(x=>x.v===sv).lb : sv+'点') : '—';
    return `<div class="sb${sv!==null?' sel':''}">
      <div class="sh"><span class="sk">${it.k}</span>
        <span class="sn">${it.n}<span class="se">${it.e}</span>${it.nc?'<span class="ncbadge">合計に含めない</span>':''}</span>
        <span class="sv">${disp}</span></div>
      ${it.h?`<div class="hint">${it.h}</div>`:''}
      ${it.imgBtn?`<div style="padding:4px 12px 8px"><button onclick="showDepthGuide()" style="display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;background:color-mix(in srgb,var(--c-skin) 14%,transparent);border:1px solid color-mix(in srgb,var(--c-skin) 40%,transparent);color:var(--c-skin);font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent">📐 深さ評価ガイドを開く</button></div>`:''}
      <div class="opts">${it.o.map(o => {
        const isSel = sv===o.v;
        const vStr = String(o.v).replace(/"/g,'&quot;');
        return `<div class="opt ${drOptCls(o,isSel)}" data-k="${it.k}" data-v="${vStr}" onclick="drSel(this)">
          <span class="rdot"></span>
          <span class="olbl ${o.lc}">${o.lb}</span>
          <span class="otx">${o.tx}${o.tag?`<span class="otag ${o.tag}">${o.tagTx}</span>`:''}
            ${o.sub?`<div class="osub">${o.sub}</div>`:''}
          </span></div>`;
      }).join('')}</div></div>`;
  }).join('');
}

const OH = [
  { k:'①', n:'自力体位変換能力', e:'自力体位変換',
    h:'意識状態の低下・麻酔・安静度・麻痺などを考慮。完全に「できる」「できない」以外はすべて「どちらでもない」',
    o:[
      {v:0,  lb:'0点', lc:'ok', tx:'できる'},
      {v:1.5,lb:'1.5点',lc:'',  tx:'どちらでもない'},
      {v:3,  lb:'3点', lc:'hv', tx:'できない'},
    ]
  },
  { k:'②', n:'病的骨突出（仙骨部）', e:'骨突出',
    h:'骨突出中央から8cm離れた部位の高低差で判定。判定器（堀田式）を使用すると正確',
    o:[
      {v:0,  lb:'0点', lc:'ok', tx:'なし（高低差なし）'},
      {v:1.5,lb:'1.5点',lc:'',  tx:'軽度・中程度（判定器がシーソー状になるが片脚は浮かない）'},
      {v:3,  lb:'3点', lc:'hv', tx:'高度（判定器の片脚が離れる）'},
    ]
  },
  { k:'③', n:'浮腫', e:'Edema',
    h:'指でやさしく5秒押す → 離しても凹んだままなら「あり」',
    o:[
      {v:0, lb:'0点', lc:'ok', tx:'なし'},
      {v:3, lb:'3点', lc:'hv', tx:'あり（圧迫後、凹みが残る）'},
    ]
  },
  { k:'④', n:'関節拘縮', e:'Contracture',
    o:[
      {v:0, lb:'0点', lc:'ok', tx:'なし'},
      {v:1, lb:'1点', lc:'hv', tx:'あり（部位・上下肢を問わず）'},
    ]
  },
];
const ohSt = {}; OH.forEach(it => ohSt[it.k] = null);

function ohSel(k, v) { ohSt[k] = (ohSt[k]===v) ? null : v; rebuildOH(); }

function ohRisk(total, allSel) {
  if (!allSel || total === 0) return { lbl:'リスク評価中…', col:'var(--mu)', sub:'' };
  if (total === 0)  return { lbl:'危険因子なし', col:'var(--ok)', sub:'体圧分散なし〜基本マットレス' };
  if (total <= 3)   return { lbl:'軽度リスク', col:'var(--ok)', sub:'褥瘡発生確率 約4〜14%｜体圧分散マットレス（基本型）' };
  if (total <= 6)   return { lbl:'中等度リスク', col:'var(--wn)', sub:'褥瘡発生確率 約26〜65%｜高機能マットレス推奨' };
  return              { lbl:'高度リスク', col:'var(--dg)', sub:'褥瘡発生確率 約80〜98%｜最高機能マットレス＋厳重管理' };
}

function rebuildOH() {
  const p = $('pane-oh'); if (!p) return;
  p.innerHTML = buildOH();
  let total = 0;
  const parts = [];
  const allSel = OH.every(it => ohSt[it.k] !== null);
  OH.forEach(it => {
    const v = ohSt[it.k];
    if (v !== null) { total += v; parts.push(it.k+':'+v+'点'); }
    else parts.push(it.k+':○');
  });
  const risk = ohRisk(total, allSel);
  const txt = `OHスケール ${total}点 [${risk.lbl}]`;
  if (!allSel && total === 0) { hideBar(); return; }
  showBar('OH合計', total+'点', txt, risk.sub, 'var(--c-skin)',
    'OHスケール',
    () => txt,
    () => { OH.forEach(it => ohSt[it.k]=null); rebuildOH(); hideBar(); }
  );
}

function buildOH() {
  const total = OH.reduce((s,it) => s + (ohSt[it.k]!==null ? ohSt[it.k] : 0), 0);
  const allSel = OH.every(it => ohSt[it.k] !== null);
  const risk = ohRisk(total, allSel);

  const tbar = `<div class="tbar">
    <div><div style="font-size:.6rem;color:var(--mu)">合計スコア</div>
      <div class="tnum" style="color:${risk.col}">${total}</div></div>
    <div><div class="trisk" style="color:${risk.col}">${risk.lbl}</div>
      <div class="trsub">${risk.sub || '全項目を選択してください'}</div>
      <div style="font-size:.6rem;color:var(--mu);margin-top:2px">最大10点 | 1〜3:軽度 / 4〜6:中等度 / 7〜10:高度</div>
    </div></div>`;

  const secs = OH.map(it => {
    const sv = ohSt[it.k];
    const disp = sv !== null ? sv+'点' : '—';
    return `<div class="sb${sv!==null?' sel':''}">
      <div class="sh"><span class="sk">${it.k}</span>
        <span class="sn">${it.n}<span class="se">${it.e}</span></span>
        <span class="sv">${disp}</span></div>
      ${it.h?`<div class="hint">${it.h}</div>`:''}
      <div class="opts">${it.o.map(o => {
        const isSel = sv===o.v;
        const cls = isSel ? (o.lc==='ok'?'c0':o.lc==='hv'?'cd':'c1') : '';
        return `<div class="opt ${cls}" onclick="ohSel('${it.k}',${o.v})">
          <span class="rdot"></span>
          <span class="olbl ${o.lc}">${o.lb}</span>
          <span class="otx">${o.tx}</span></div>`;
      }).join('')}</div></div>`;
  }).join('');

  return tbar + secs;
}

const edSt = { grade:null, type:null, range:null, color:null, texture:null };

let tmrIv=null, tmrT0=null, tmrSec=0, tmrOn=false;

function tmrToggle() {
  if (!tmrOn) {
    tmrT0 = Date.now() - tmrSec*1000;
    tmrIv = setInterval(tmrTick, 100);
    tmrOn = true;
    const btn = $('ed-tbtn'); if (btn) { btn.textContent='停止'; btn.className='tbtn tbtn-rs'; }
  } else {
    clearInterval(tmrIv); tmrOn = false;
    const btn = $('ed-tbtn'); if (btn) { btn.textContent='再開'; btn.className='tbtn tbtn-go'; }
  }
}
function tmrTick() {
  tmrSec = (Date.now()-tmrT0)/1000;
  const d=$('ed-tdisp'), j=$('ed-tjdg'); if (!d) return;
  d.textContent = tmrSec.toFixed(1)+'s';
  if (tmrSec < 40) { d.className='tdisp run'; if(j) j.innerHTML='<span style="color:var(--bl)">▶ fast edema（＜40秒）</span>'; }
  else             { d.className='tdisp done'; if(j) j.innerHTML='<span style="color:var(--wn)">▶ slow edema（≥40秒）</span>'; }
}
function tmrReset() {
  clearInterval(tmrIv); tmrOn=false; tmrSec=0;
  const d=$('ed-tdisp'), j=$('ed-tjdg'), b=$('ed-tbtn');
  if (d) { d.textContent='0.0s'; d.className='tdisp'; }
  if (j) j.innerHTML='';
  if (b) { b.textContent='計測開始'; b.className='tbtn tbtn-go'; }
}

function edSel(el) {
  const id = el.dataset.id;
  const raw = el.dataset.v;
  // 数値に変換できる場合は数値として扱う
  const v = raw === 'NPE' || raw === 'fast' || raw === 'slow' ? raw : (isNaN(Number(raw)) ? raw : Number(raw));
  edSt[id] = (edSt[id]===v) ? null : v;
  if (id==='grade' && v!==2 && v!==3) edSt.type = null;
  rebuildEdema();
}

function edResultTxt() {
  const site = ($('ed-site-inp')?.value.trim()) || '部位未記入';
  const g = edSt.grade!==null ? (edSt.grade==='NPE'?'NPE':'grade'+edSt.grade) : '○';
  const t = (edSt.grade===2||edSt.grade===3) ? (edSt.type?'('+edSt.type+')':'(○)') : '';
  const r = edSt.range||'○', c = edSt.color||'○', k = edSt.texture||'○';
  return `浮腫[${site}] ${g}${t} 範囲:${r} 色調:${c} 性状:${k}`;
}

function reEdResult() {
  const g = edSt.grade;
  if (g === null) { hideBar(); return; }
  const grDisp = g==='NPE'?'NPE':'G'+g;
  let interp = '';
  if (g===0) interp='浮腫なし';
  else if (g===1) interp='軽微（要観察）';
  else if (g===2) interp='浮腫あり（中等度）'+(edSt.type==='fast'?'｜低Alb示唆':edSt.type==='slow'?'｜心腎不全等示唆':'');
  else if (g===3) interp='浮腫あり（高度）'+(edSt.type==='fast'?'｜低Alb示唆':edSt.type==='slow'?'｜心腎不全等示唆':'');
  else if (g==='NPE') interp='非圧痕性浮腫｜リンパ浮腫等を考慮';
  const txt = edResultTxt();
  showBar('グレード', grDisp, txt, interp, 'var(--c-circ)',
    '浮腫観察スコア',
    () => txt,
    () => { Object.keys(edSt).forEach(k=>edSt[k]=null); tmrReset(); const si=$('ed-site-inp'); if(si) si.value=''; rebuildEdema(); hideBar(); }
  );
}

function rebuildEdema() {
  const p = $('pane-edema'); if (!p) return;
  // 部位入力値を保持してから再生成
  const siteVal = p.querySelector('#ed-site-inp')?.value || '';
  p.innerHTML = buildEdema();
  const siteEl = p.querySelector('#ed-site-inp');
  if (siteEl) siteEl.value = siteVal;
  reEdResult();
}

function buildEdema() {
  const lrHtml = `<div style="margin-bottom:10px">
    <div style="font-size:.63rem;color:var(--mu);margin-bottom:4px">部位（コピー時に反映）</div>
    <input id="ed-site-inp" type="text" placeholder="例：脛骨前面、足背、仙骨部…"
      oninput="reEdResult()"
      style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:8px 10px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:.78rem;outline:none;-webkit-appearance:none">
  </div>`;

  const timerHtml = `<div class="tmr">
    <div><div style="font-size:.58rem;color:var(--mu);margin-bottom:2px">圧迫後経過時間</div>
      <div class="tdisp" id="ed-tdisp">0.0s</div></div>

      <div id="ed-tjdg" style="margin-top:3px;font-size:.68rem"></div></div>
    <div class="tbtns">
      <button class="tbtn tbtn-go" id="ed-tbtn" onclick="tmrToggle()">計測開始</button>
      <button class="tbtn tbtn-rs" onclick="tmrReset()">リセット</button>
    </div></div>`;

  const secs = ED_SECS.map(sec => {
    const isHidden = sec.showIf && !sec.showIf();

    const cv = edSt[sec.id];
    const co = cv!==null ? sec.opts.find(o=>o.v===cv) : null;
    const disp = co ? co.lb : '—';
    return `<div class="sb${cv!==null?' sel':''}" data-sec-id="${sec.id}" style="${isHidden?'display:none':''}">
      <div class="sh"><span class="sk">${sec.k}</span>
        <span class="sn">${sec.n}<span class="se">${sec.e}</span></span>
        <span class="sv">${disp}</span></div>
      ${sec.h?`<div class="hint">${sec.h}</div>`:''}
      <div class="opts">${sec.opts.map(o=>{
        const isSel = cv===o.v;
        const vStr = String(o.v).replace(/"/g,'&quot;');
        return `<div class="opt${isSel?' '+o.cls:''}" data-id="${sec.id}" data-v="${vStr}" onclick="edSel(this)">

          <span class="olbl ${o.lc}">${o.lb}</span>

      }).join('')}</div></div>`;
  }).join('');

  return lrHtml + timerHtml + secs;
}

const dhSt = {};
DH_SECS.forEach(s => dhSt[s.id] = null);

function dhSel(el) {
  const id = el.dataset.id;
  const v  = el.dataset.v;
  dhSt[id] = (dhSt[id] === v) ? null : v;
  rebuildDehydration();
}

function dhSeverity() {
  const vals = Object.values(dhSt).filter(v => v !== null);
  if (!vals.length) return null;
  const cd = vals.filter(v => DH_SECS.flatMap(s=>s.opts).find(o=>o.v===v&&o.cls==='cd')).length;
  const cw = vals.filter(v => DH_SECS.flatMap(s=>s.opts).find(o=>o.v===v&&o.cls==='cw')).length;
  if (cd >= 2)       return { lbl:'高度脱水の疑い', col:'var(--dg)', sub:'医師への速やかな報告・輸液対応を検討' };
  if (cd === 1 || cw >= 3) return { lbl:'中等度脱水の疑い', col:'var(--wn)', sub:'経口補水または輸液の適応を評価' };
  if (cw >= 1)       return { lbl:'軽度脱水の可能性', col:'var(--ok)', sub:'経口水分補給を促す・継続観察' };
  return               { lbl:'脱水所見なし', col:'var(--ok)', sub:'引き続き定期観察' };
}

function dhResultTxt() {
  const parts = DH_SECS.map(s => {
    const v = dhSt[s.id];
    return v ? `${s.k}:${v}` : `${s.k}:○`;
  });
  const sev = dhSeverity();
  return parts.join(' / ') + (sev ? `\n→ ${sev.lbl}` : '');
}

function redhResult() {
  const sev = dhSeverity();
  if (!sev) { hideBar(); return; }
  const txt = dhResultTxt();
  showBar('脱水判定', sev.lbl, txt, sev.sub, 'var(--c-circ)',
    '脱水身体所見',
    () => txt,
    () => { DH_SECS.forEach(s => dhSt[s.id]=null); rebuildDehydration(); hideBar(); }
  );
}

function rebuildDehydration() {
  const p = $('pane-dehydration'); if (!p) return;
  p.innerHTML = buildDehydration();
  redhResult();
}

function buildDehydration() {
  const sev = dhSeverity();
  const tbar = sev ? `<div class="tbar">
    <div style="flex-shrink:0">
      <div style="font-size:.6rem;color:var(--mu)">総合判定</div>
      <div style="font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:${sev.col}">${sev.lbl}</div>
    </div>
    <div style="font-size:.68rem;color:var(--mu);line-height:1.5">${sev.sub}</div>
  </div>` : `<div style="font-size:.68rem;color:var(--mu);padding:4px 2px 10px;line-height:1.6">
    各項目を観察して選択してください。複数所見から総合的に脱水の重症度を判定します。<br>
    <span style="color:var(--ok)">■</span>正常　<span style="color:var(--wn)">■</span>脱水疑い　<span style="color:var(--dg)">■</span>高度脱水
  </div>`;

  const secs = DH_SECS.map(sec => {
    const cv = dhSt[sec.id];
    const co = cv !== null ? sec.opts.find(o => o.v === cv) : null;
    const disp = co ? co.lb : '—';
    return `<div class="sb${cv !== null ? ' sel' : ''}">
      <div class="sh">
        <span class="sk">${sec.k}</span>
        <span class="sn">${sec.n}<span class="se">${sec.e}</span></span>
        <span class="sv">${disp}</span>
      </div>
      ${sec.h ? `<div class="hint">${sec.h}</div>` : ''}
      <div class="opts">${sec.opts.map(o => {
        const isSel = cv === o.v;
        const vStr = o.v.replace(/"/g, '&quot;');
        return `<div class="opt${isSel ? ' ' + o.cls : ''}" data-id="${sec.id}" data-v="${vStr}" onclick="dhSel(this)">
          <span class="rdot"></span>
          <span class="olbl ${o.lc}">${o.lb}</span>
          <span class="otx">${o.tx}${o.sub ? `<div class="osub">${o.sub}</div>` : ''}</span>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');

  return tbar + secs;
}

    ]

// 付加症状（脳卒中を強く示唆する随伴症状）
const CPSS_ADD = [
  {id:'onset',   tx:'突然の発症（発症時刻が特定できる）'},
  {id:'headache',tx:'経験したことのない激しい頭痛'},
  {id:'vision',  tx:'片眼が見えない・物が二重に見える・視野の半分が欠ける'},
  {id:'gait',    tx:'力はあるのに立てない・歩けない・フラフラする'},
  {id:'limb',    tx:'片方の手足・顔半分の麻痺・しびれ'},
];

const cpSt = {}; CPSS_ITEMS.forEach(s=>cpSt[s.id]=null);
const cpAdd = {}; CPSS_ADD.forEach(s=>cpAdd[s.id]=false);

function cpSel(el) {
  const id=el.dataset.id, v=el.dataset.v;
  cpSt[id] = cpSt[id]===v ? null : v;
  rebuildCPSS();
}
function cpToggle(id) {
  cpAdd[id] = !cpAdd[id];
  rebuildCPSS();
}

function cpResult() {
  const pos = CPSS_ITEMS.filter(it=>cpSt[it.id]==='異常').length;
  const addPos = CPSS_ADD.filter(it=>cpAdd[it.id]).map(it=>it.tx);
  const allSet = CPSS_ITEMS.every(it=>cpSt[it.id]!==null);
  if (!allSet && pos===0) return null;
  const positive = pos > 0;
  return {
    positive,
    pos,
    addPos,
    lbl: positive ? 'CPSS陽性（脳卒中を強く疑う）' : 'CPSS陰性',
    col: positive ? 'var(--dg)' : 'var(--ok)',
    sub: positive ? `${pos}項目陽性 → 直ちに専門医療機関への搬送を検討。発症時刻を確認。` : '3項目すべて正常。他の随伴症状も確認する。'
  };
}

function rebuildCPSS() {
  const p=$('pane-cpss'); if(p) p.innerHTML=buildCPSS();
  const r = cpResult(); if(!r){hideBar();return;}
  const addStr = r.addPos.length ? '\n随伴症状: '+r.addPos.join(' / ') : '';
  const face = cpSt.face||'○', arm = cpSt.arm||'○', speech = cpSt.speech||'○';
  const txt = `CPSS [顔:${face} 上肢:${arm} 言語:${speech}] → ${r.lbl}${addStr}`;
  showBar('CPSS', r.lbl, txt, r.sub, 'var(--c-emg)',
    'CPSS（シンシナティ病院前脳卒中スケール）', () => txt,
    () => { CPSS_ITEMS.forEach(s=>cpSt[s.id]=null); CPSS_ADD.forEach(s=>cpAdd[s.id]=false); rebuildCPSS(); hideBar(); }
  );
}

  const r = cpResult();
  const banner = `<div style="background:color-mix(in srgb,var(--c-emg) 8%,var(--s3));border:1px solid color-mix(in srgb,var(--c-emg) 25%,transparent);border-radius:9px;padding:10px 13px;margin-bottom:10px">

  const resultBar = r ? `<div class="tbar">
    <div><div style="font-size:.6rem;color:var(--mu)">判定</div>
      <div style="font-family:'DM Mono',monospace;font-size:.95rem;font-weight:700;color:${r.col}">${r.lbl}</div></div>
    <div style="font-size:.67rem;color:var(--mu);line-height:1.5">${r.sub}</div>
  </div>` : '';

  const secs = CPSS_ITEMS.map(sec => {
    const cv = cpSt[sec.id];
    return `<div class="sb${cv?' sel':''}">
      <div class="sh"><span class="sk">${sec.k}</span>
        <span class="sn">${sec.n}<span class="se">${sec.e}</span></span>
        <span class="sv" style="color:${cv==='異常'?'var(--dg)':cv==='正常'?'var(--ok)':'var(--mu)'}">${cv||'—'}</span>
      </div>
      <div class="hint">${sec.h}</div>
      <div class="opts">${sec.opts.map(o=>{
        const isSel=cv===o.v;
        return `<div class="opt${isSel?' '+o.cls:''}" data-id="${sec.id}" data-v="${o.v}" onclick="cpSel(this)">
          <span class="rdot"></span>
          <span class="olbl ${o.lc}">${o.lb}</span>
          <span class="otx">${o.tx}</span></div>`;
      }).join('')}</div></div>`;
  }).join('');

  const addChecks = `<div class="sb">
    <div class="sh"><span class="sk" style="font-size:.78rem">随伴</span>
      <span class="sn">脳卒中を示唆する随伴症状<span class="se">Additional Symptoms</span></span></div>
    <div style="padding:7px 10px 10px;display:flex;flex-direction:column;gap:5px">
      ${CPSS_ADD.map(it=>`
      <div onclick="cpToggle('${it.id}')" style="display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;border:1px solid ${cpAdd[it.id]?'rgba(239,138,96,.5)':'var(--bd)'};background:${cpAdd[it.id]?'rgba(239,138,96,.08)':'transparent'};cursor:pointer;-webkit-tap-highlight-color:transparent">
        <span style="width:18px;height:18px;border-radius:4px;border:2px solid ${cpAdd[it.id]?'var(--c-emg)':'var(--mu)'};background:${cpAdd[it.id]?'var(--c-emg)':'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#0c1018">${cpAdd[it.id]?'✓':''}</span>
        <span style="font-size:.76rem;line-height:1.4">${it.tx}</span>
      </div>`).join('')}
    </div>
  </div>`;

  return banner + resultBar + secs + addChecks;
}

// LVO観察（主幹動脈閉塞スクリーニング）
// 日本脳卒中学会提言 6項目（令和4年）
// ══════════════════════════════════════════════
const LVO_ITEMS = [
  { id:'pulse',   k:'脈', n:'脈不整', e:'Irregular Pulse',
    h:'橈骨動脈を触診し脈のリズムを確認。心房細動は心原性脳塞栓（LVO）の主要原因',
    opts:[
      {v:'整',  lb:'整',  lc:'ok',cls:'c0',tx:'脈拍リズム整（正常）'},
      {v:'不整',lb:'不整',lc:'hv',cls:'cd',tx:'脈不整あり（心房細動を疑う）'},
    ]
  },
  { id:'gaze',    k:'眼球', n:'共同偏視', e:'Conjugate Gaze Deviation',
    h:'正面を見てもらい眼球が一側に偏っていないか確認。大脳半球または橋の病変を示唆する',
    opts:[
      {v:'なし',lb:'なし',lc:'ok',cls:'c0',tx:'眼球正中位（正常）'},
      {v:'あり',lb:'あり',lc:'hv',cls:'cd',tx:'共同偏視あり → 大脳または橋の大きな病変を示唆'},
    ]
  },
  { id:'neglect', k:'無視', n:'半側空間無視', e:'Hemispatial Neglect',
    h:'検者が指4本を患者の正面に出し「指は何本ですか？」と質問。4本と答えられなければ陽性',
    opts:[
      {v:'なし',lb:'なし',lc:'ok',cls:'c0',tx:'指4本を正答（正常）'},
      {v:'あり',lb:'あり',lc:'hv',cls:'cd',tx:'指の本数を誤答 → 半側空間無視を疑う'},
    ]
  },
  { id:'aphasia', k:'失語', n:'失語', e:'Aphasia',
    h:'眼鏡または時計を見せて「これは何ですか？」と質問。答えられなければ失語陽性（呼称障害）',
    opts:[
      {v:'なし',lb:'なし',lc:'ok',cls:'c0',tx:'正しく呼称できる（正常）'},
      {v:'あり',lb:'あり',lc:'hv',cls:'cd',tx:'呼称できない・誤答 → 失語を疑う（優位半球障害）'},
    ]
  },
  { id:'facepal', k:'顔麻', n:'顔面麻痺', e:'Facial Palsy',
    h:'「歯を見せて」と指示。片側顔面の下垂・非対称が陽性',
    opts:[
      {v:'なし',lb:'なし',lc:'ok',cls:'c0',tx:'顔面対称（正常）'},
      {v:'あり',lb:'あり',lc:'hv',cls:'cd',tx:'顔面麻痺あり（片側下垂・非対称）'},
    ]
  },
  { id:'armpal',  k:'上肢麻', n:'上肢麻痺', e:'Arm Palsy',
    h:'両腕を前に伸ばし10秒保持。片側の下垂・脱力が陽性',
    opts:[
      {v:'なし',lb:'なし',lc:'ok',cls:'c0',tx:'両側均等に保持（正常）'},
      {v:'あり',lb:'あり',lc:'hv',cls:'cd',tx:'片側の下垂・脱力あり'},
    ]
  },
];

const lvoSt = {}; LVO_ITEMS.forEach(s=>lvoSt[s.id]=null);

function lvoSel(el) {
  const id=el.dataset.id, v=el.dataset.v;
  lvoSt[id] = lvoSt[id]===v ? null : v;
  rebuildLVO();
}

function lvoCount() {
  return LVO_ITEMS.filter(it=>lvoSt[it.id]==='あり').length;
}

function lvoJudge(n) {
  if (n===0) return {lbl:'LVO陰性の可能性', col:'var(--ok)', sub:'陽性項目なし。引き続き観察を継続する。'};
  if (n===1) return {lbl:'要注意（1項目陽性）', col:'var(--wn)', sub:'感度重視なら血栓回収療法対応施設への搬送を検討。'};
  if (n>=2)  return {lbl:'LVO強く疑う（2項目以上陽性）', col:'var(--dg)', sub:'血栓回収療法（EVT）対応施設への直接搬送を考慮。発症時刻・最終未発症時刻を確認。'};
}

function rebuildLVO() {
  const p=$('pane-lvo'); if(p) p.innerHTML=buildLVO();
  const n=lvoCount();
  const anySet=LVO_ITEMS.some(it=>lvoSt[it.id]!==null);
  if(!anySet){hideBar();return;}
  const j=lvoJudge(n);
  const parts=LVO_ITEMS.map(it=>`${it.k}:${lvoSt[it.id]||'○'}`).join(' ');
  const txt=`LVO観察 ${n}/6項目陽性 [${j.lbl}]\n${parts}`;
  showBar('LVO', n+'/6陽性', txt, j.sub, 'var(--c-emg)',
    'LVO観察（主幹動脈閉塞スクリーニング）', () => txt,
    () => { LVO_ITEMS.forEach(s=>lvoSt[s.id]=null); rebuildLVO(); hideBar(); }
  );
}

function buildLVO() {
  const n=lvoCount();
  const anySet=LVO_ITEMS.some(it=>lvoSt[it.id]!==null);
  const j=anySet ? lvoJudge(n) : null;

  const banner = `<div style="background:color-mix(in srgb,var(--c-emg) 8%,var(--s3));border:1px solid color-mix(in srgb,var(--c-emg) 25%,transparent);border-radius:9px;padding:10px 13px;margin-bottom:10px">
    <div style="font-size:.72rem;font-weight:700;color:var(--c-emg);margin-bottom:3px">🧠 脳血管疾患（主幹動脈閉塞）を疑う際に使用</div>
    <div style="font-size:.66rem;color:var(--mu);line-height:1.6">CPSSで脳卒中陽性後、さらにLVO（Large Vessel Occlusion）の有無を評価する。<br>日本脳卒中学会提言6項目（令和4年）。<strong style="color:var(--tx)">2項目以上陽性でEVT対応施設への直接搬送を考慮</strong>。</div>
  </div>`;

  // スコアバー
  const scorebar = `<div class="tbar">
    <div><div style="font-size:.6rem;color:var(--mu)">陽性項目数</div>
      <div style="font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:500;color:${j?j.col:'var(--mu)'}">
        ${n}<span style="font-size:.9rem;color:var(--mu)"> / 6</span></div></div>
    <div><div style="font-size:.8rem;font-weight:700;color:${j?j.col:'var(--mu)'}">${j?j.lbl:'評価中…'}</div>
      <div style="font-size:.64rem;color:var(--mu);margin-top:2px">${j?j.sub:'各項目を観察して選択してください'}</div>
      <div style="font-size:.6rem;color:var(--mu);margin-top:2px">2項目：感度重視 / 3項目：特異度重視（地域体制に応じて選択）</div>
    </div></div>`;

  const secs = LVO_ITEMS.map(sec=>{
    const cv=lvoSt[sec.id];
    return `<div class="sb${cv?' sel':''}">
      <div class="sh"><span class="sk" style="font-size:.78rem;min-width:34px">${sec.k}</span>
        <span class="sn">${sec.n}<span class="se">${sec.e}</span></span>
        <span class="sv" style="color:${cv==='あり'?'var(--dg)':cv==='なし'?'var(--ok)':'var(--mu)'}">${cv||'—'}</span>
      </div>
      <div class="hint">${sec.h}</div>
      <div class="opts">${sec.opts.map(o=>{
        const isSel=cv===o.v;
        return `<div class="opt${isSel?' '+o.cls:''}" data-id="${sec.id}" data-v="${o.v}" onclick="lvoSel(this)">
          <span class="rdot"></span>
          <span class="olbl ${o.lc}">${o.lb}</span>
          <span class="otx">${o.tx}</span></div>`;
      }).join('')}</div></div>`;
  }).join('');

  return banner + scorebar + secs;
}

// ══════════════════════════════════════════════
// TEE（Total Energy Expenditure）Harris-Benedict式
// BEE × 活動係数 × ストレス係数
// ══════════════════════════════════════════════
function calcTEE() {
  const sex   = document.querySelector('input[name="tee-sex"]:checked')?.value;
  const w     = parseFloat($('tee-weight')?.value);
  const h     = parseFloat($('tee-height')?.value);
  const age   = parseFloat($('tee-age')?.value);
  const af    = parseFloat($('tee-af')?.value   || 1.2);
  const sf    = parseFloat($('tee-sf')?.value   || 1.0);
  const resEl = $('tee-result');
  if (!resEl) return;

  if (!sex || isNaN(w) || isNaN(h) || isNaN(age) || w<=0 || h<=0 || age<=0) {
    resEl.innerHTML = '<span style="font-size:.7rem;color:var(--mu)">性別・体重・身長・年齢をすべて入力してください</span>';
    hideBar(); return;
  }

  // Harris-Benedict式（原版 1919）
  let bee;
  if (sex === 'male') {
    bee = 66.47 + 13.75*w + 5.00*h - 6.76*age;
  } else {
    bee = 655.10 + 9.56*w + 1.85*h - 4.68*age;
  }
  const tee = Math.round(bee * af * sf);
  const bee_r = Math.round(bee);
  const ree   = Math.round(bee * 1.2); // REE = BEE × 1.2

  resEl.innerHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
      <div>
        <div style="font-size:.58rem;color:var(--mu)">TEE（総エネルギー消費量）</div>
        <div style="font-family:'DM Mono',monospace;font-size:2rem;font-weight:500;color:var(--c-circ)">
          ${tee}<span style="font-size:.8rem;color:var(--mu)"> kcal/日</span></div>
      </div>
      <div style="font-size:.72rem;color:var(--mu);line-height:2">
        BEE：${bee_r} kcal/日<br>
        REE（BEE×1.2）：${ree} kcal/日<br>
        活動係数(AF)：${af}　ストレス係数(SF)：${sf}
      </div>
    </div>
    <div style="background:var(--s3);border-radius:7px;padding:8px 10px;font-size:.65rem;color:var(--mu);line-height:1.8">
      <span style="color:var(--tx);font-weight:500">式：TEE = BEE × AF × SF</span><br>
      ${sex==='male'?'男性':'女性'} BEE = ${sex==='male'?'66.47 + 13.75×W + 5.00×H − 6.76×A':'655.10 + 9.56×W + 1.85×H − 4.68×A'}<br>
      W=${w}kg, H=${h}cm, A=${age}歳<br>
      <span style="color:var(--wn);font-size:.6rem">※原版は欧米人対象（体重25〜125kg・身長151〜200cm・年齢21〜70歳）。参考値として使用すること。</span>
    </div>`;

  const txt = `TEE ${tee}kcal/日（BEE:${bee_r}kcal × AF:${af} × SF:${sf} / ${sex==='male'?'男':'女'} ${w}kg ${h}cm ${age}歳）`;
  showBar('TEE', tee+'kcal', txt, `BEE ${bee_r}kcal × AF${af} × SF${sf}`, 'var(--c-circ)',
    'TEE（Harris-Benedict式）', () => txt,
    () => {
      ['tee-weight','tee-height','tee-age'].forEach(id => { const el=$(id); if(el) el.value=''; });
      const af_el=$('tee-af'), sf_el=$('tee-sf');
      if(af_el) af_el.value='1.2'; if(sf_el) sf_el.value='1.0';
      const m=document.querySelector('input[name="tee-sex"][value="male"]');
      if(m) m.checked=true;
      const r=$('tee-result'); if(r) r.innerHTML='<span style="font-size:.7rem;color:var(--mu)">性別・体重・身長・年齢をすべて入力してください</span>';
      hideBar();
    }
  );
}

function buildTEE() {
  const inStyle = 'width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:8px 10px;color:var(--tx);font-size:.88rem;font-family:"DM Mono",monospace;outline:none;-webkit-appearance:none';
  const selStyle = inStyle + ';cursor:pointer';
  const lblStyle = 'font-size:.65rem;color:var(--mu);margin-bottom:4px;display:block';

  // 活動係数オプション
  const afOpts = [
    {v:'1.2',  t:'1.2 — ベッド上安静（寝たきり）'},
    {v:'1.3',  t:'1.3 — ベッド外活動あり（座位中心）'},
    {v:'1.5',  t:'1.5 — 軽度活動（室内歩行程度）'},
    {v:'1.75', t:'1.75 — 中等度活動（通常歩行）'},
    {v:'2.0',  t:'2.0 — 高度活動（定期的な運動）'},
  ].map(o => `<option value="${o.v}">${o.t}</option>`).join('');

  // ストレス係数オプション
  const sfOpts = [
    {v:'1.0',  t:'1.0 — 通常（ストレスなし）'},
    {v:'1.1',  t:'1.1 — 軽度侵襲（軽い外傷・感染）'},
    {v:'1.2',  t:'1.2 — 中等度侵襲（術後・肺炎）'},
    {v:'1.3',  t:'1.3 — 高度侵襲（多発外傷・敗血症）'},
    {v:'1.5',  t:'1.5 — 超高度侵襲（重症熱傷・多臓器不全）'},
  ].map(o => `<option value="${o.v}">${o.t}</option>`).join('');

  return `
  <div style="padding:2px 2px 10px;font-size:.68rem;color:var(--mu);line-height:1.6">
    Harris-Benedict式でBEEを算出し、活動係数・ストレス係数を乗じてTEEを計算します。<br>
    <span style="color:var(--tx)">TEE = BEE × 活動係数(AF) × ストレス係数(SF)</span>
  </div>

  <div class="sb"><div class="sh"><span class="sk" style="font-size:.8rem;min-width:40px">入力</span><span class="sn">患者情報</span></div>
  <div style="padding:10px 12px;display:flex;flex-direction:column;gap:10px">

    <div>
      <span style="${lblStyle}">性別</span>
      <div style="display:flex;gap:0;border-radius:7px;overflow:hidden;border:1px solid var(--bd)">
        <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;background:var(--s3);cursor:pointer;font-size:.82rem;-webkit-tap-highlight-color:transparent">
          <input type="radio" name="tee-sex" value="male" onchange="calcTEE()" style="accent-color:var(--c-circ)"> 男性
        </label>
        <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;background:var(--s3);border-left:1px solid var(--bd);cursor:pointer;font-size:.82rem;-webkit-tap-highlight-color:transparent">
          <input type="radio" name="tee-sex" value="female" onchange="calcTEE()" style="accent-color:var(--c-circ)"> 女性
        </label>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div><span style="${lblStyle}">体重 (kg)</span>
        <input id="tee-weight" type="number" min="10" max="200" step="0.1" placeholder="55" oninput="calcTEE()" style="${inStyle}"></div>
      <div><span style="${lblStyle}">身長 (cm)</span>
        <input id="tee-height" type="number" min="100" max="220" step="0.1" placeholder="160" oninput="calcTEE()" style="${inStyle}"></div>
      <div><span style="${lblStyle}">年齢 (歳)</span>
        <input id="tee-age" type="number" min="1" max="120" step="1" placeholder="75" oninput="calcTEE()" style="${inStyle}"></div>
    </div>

    <div><span style="${lblStyle}">活動係数 (AF)</span>
      <select id="tee-af" onchange="calcTEE()" style="${selStyle}">${afOpts}</select></div>

    <div><span style="${lblStyle}">ストレス係数 (SF)</span>
      <select id="tee-sf" onchange="calcTEE()" style="${selStyle}">${sfOpts}</select></div>

  </div></div>

  <div class="sb"><div class="sh"><span class="sk" style="font-size:.8rem;min-width:40px">結果</span><span class="sn">計算結果</span></div>
  <div style="padding:12px" id="tee-result">
    <span style="font-size:.7rem;color:var(--mu)">性別・体重・身長・年齢をすべて入力してください</span>
  </div></div>`;
}

// ══════════════════════════════════════════════
// 不感蒸泄計算
// ══════════════════════════════════════════════
function calcInsensible() {
  const wEl=$('ins-weight'), tEl=$('ins-temp');
  if (!wEl||!tEl) return;
  const w=parseFloat(wEl.value), t=parseFloat(tEl.value);
  const resEl=$('ins-result');
  if (!resEl) return;
  if (isNaN(w)||isNaN(t)||w<=0) { resEl.innerHTML='<span style="color:var(--mu)">体重と体温を入力してください</span>'; hideBar(); return; }
  const base = w * 15;
  const fever = Math.max(0, (t - 36.8) * 200);

// SPAツール（ストーマ・フィジカルアセスメント）
// 表２準拠 Step1〜4 / 11項目
// ══════════════════════════════════════════════

const spaSt = {
  shape:null, perioskin:null, firmness:null,
  flatness:null, wrinkle_nc:null, wrinkle_c:null,
  stoma_type:null, discharge:null, wear_stable:null
};
const spaNum = { height:'', width:'' };

function spaSel(el) {
  const id = el.dataset.id, v = el.dataset.spaOpt;
  spaSt[id] = (spaSt[id]===v) ? null : v;
  spaRefresh();
}
function spaNumInput(id) {
  const el = document.getElementById('spa-num-'+id);
  if (el) spaNum[id] = el.value;
  spaUpdateBar();
}

function rebuildSPA() {
  const p = document.getElementById('pane-spa'); if (!p) return;
  p.innerHTML = buildSPA();
  Object.keys(spaNum).forEach(function(id) {
    const el = document.getElementById('spa-num-'+id);
    if (el) el.value = spaNum[id];
  });
  spaRefresh();
}

function spaRefresh() {
  const p = document.getElementById('pane-spa'); if (!p) return;
  const ids = Object.keys(spaSt);
  ids.forEach(function(secId) {
    const sbEl = p.querySelector('[data-spa-sb="'+secId+'"]'); if (!sbEl) return;
    const cv = spaSt[secId];
    sbEl.classList.toggle('sel', cv !== null);
    const svEl = sbEl.querySelector('.spa-sv');
    if (svEl) {
      if (!cv) { svEl.textContent = '—'; svEl.style.color = 'var(--mu)'; return; }
      const short = cv.replace(/（[^）]*）/g,'').replace('ストーマ','').substring(0,6);
      svEl.textContent = short;
      const optEl = sbEl.querySelector('[data-spa-opt="'+cv.replace(/"/g,'\"')+'"]');
      const cls = optEl ? optEl.dataset.spaCls : '';
      svEl.style.color = cls==='cd'?'var(--dg)':cls==='cw'?'var(--wn)':'var(--ok)';
    }
    sbEl.querySelectorAll('[data-spa-opt]').forEach(function(optEl) {
      const ov = optEl.dataset.spaOpt, cls = optEl.dataset.spaCls||'';
      optEl.className = 'opt'+(cv===ov?' '+cls:'');
    });
  });
  // 判定バー
  var cdCount=0, cwCount=0;
  ids.forEach(function(id) {
    const v=spaSt[id]; if (!v) return;
    const p2 = document.getElementById('pane-spa'); if (!p2) return;
    const el = p2.querySelector('[data-spa-opt="'+v.replace(/"/g,'\"')+'"]'); if (!el) return;
    if (el.dataset.spaCls==='cd') cdCount++;
    if (el.dataset.spaCls==='cw') cwCount++;
  });
  const anySet = ids.some(function(k){return spaSt[k]!==null;})
               || Object.keys(spaNum).some(function(k){return spaNum[k]!=='';});
  const judge = cdCount>=2?'装具変更・専門的ケアが必要'
              : (cdCount>=1||cwCount>=3)?'装具・ケア方法の再検討が必要'
              : '現在の装具で対応可能';
  const jcol = cdCount>=2?'var(--dg)':(cdCount>=1||cwCount>=3)?'var(--wn)':'var(--ok)';
  const tbarEl = p.querySelector('#spa-tbar');
  if (tbarEl) { tbarEl.style.display = anySet?'':'none'; }
  const lblEl = p.querySelector('#spa-tbar-lbl');
  if (lblEl) { lblEl.textContent = judge; lblEl.style.color = jcol; }
  spaUpdateBar();
}

function spaUpdateBar() {
  const ids = Object.keys(spaSt);
  const anySet = ids.some(function(k){return spaSt[k]!==null;})
               || Object.keys(spaNum).some(function(k){return spaNum[k]!=='';});
  if (!anySet) { hideBar(); return; }
  const p = document.getElementById('pane-spa');
  var cdCount=0, cwCount=0;
  ids.forEach(function(id) {
    const v=spaSt[id]; if (!v||!p) return;
    const el = p.querySelector('[data-spa-opt="'+v.replace(/"/g,'\"')+'"]'); if (!el) return;
    if (el.dataset.spaCls==='cd') cdCount++;
    if (el.dataset.spaCls==='cw') cwCount++;
  });
  const judge = cdCount>=2?'装具変更・専門的ケアが必要'
              : (cdCount>=1||cwCount>=3)?'装具・ケア方法の再検討が必要'
              : '現在の装具で対応可能';
  var lines = [];
  var s1=[]; if(spaSt.shape) s1.push('①形状:'+spaSt.shape);
  if(spaNum.height) s1.push('②高さ:'+spaNum.height+'mm'+(parseFloat(spaNum.height)>=10?'(突出)':'(平坦)'));
  if(spaSt.perioskin) s1.push('③周囲皮膚:'+spaSt.perioskin);
  if(s1.length) lines.push('[Step 1] '+s1.join(' / '));
  if(spaSt.firmness) lines.push('[Step 2] ④腹壁硬度:'+spaSt.firmness);
  var s3=[];
  if(spaNum.width) s3.push('⑤横径:'+spaNum.width+'mm');
  if(spaSt.flatness) s3.push('⑥平坦度:'+spaSt.flatness);
  if(spaSt.wrinkle_nc) s3.push('⑦非連結しわ:'+spaSt.wrinkle_nc);
  if(spaSt.wrinkle_c) s3.push('⑧連結しわ:'+spaSt.wrinkle_c);
  if(s3.length) lines.push('[Step 3] '+s3.join(' / '));
  var s4=[];
  if(spaSt.stoma_type) s4.push('⑨種類:'+spaSt.stoma_type);
  if(spaSt.discharge) s4.push('⑩排泄物:'+spaSt.discharge);
  if(spaSt.wear_stable) s4.push('⑪装着:'+spaSt.wear_stable);
  if(s4.length) lines.push('[Step 4] '+s4.join(' / '));
  const txt = 'SPAツール → '+judge+'\n'+lines.join('\n');
  showBar('SPA','評価済',txt,judge,'var(--c-stoma)',
    'SPAツール（ストーマ・フィジカルアセスメント）',
    function(){return txt;},
    function(){
      Object.keys(spaSt).forEach(function(k){spaSt[k]=null;});
      Object.keys(spaNum).forEach(function(k){spaNum[k]='';});
      rebuildSPA(); hideBar();
    }
  );
}

    + selSec('perioskin','③','ストーマ周囲4cm以内の皮膚異常','手術創・瘢痕・骨突出・局所的膨隆の有無',[
        {v:'なし',lc:'ok',cls:'c0',tx:'手術創・瘢痕・骨突出・局所的膨隆なし'},
        {v:'あり',lc:'hv',cls:'cd',tx:'手術創・瘢痕・骨突出・局所的膨隆あり'},
      ]);

  var s2 = stepHead('Step 2　仰臥位','腹壁の硬度を確認')
    + selSec('firmness','④','ストーマ周囲4cm以内の腹壁硬度','2本の指でストーマ周囲腹部を押す',[
        {v:'硬い',     lc:'ok',cls:'c0',tx:'硬い — 1縦指以下の沈み'},
        {v:'普通',     lc:'',  cls:'c1',tx:'普通 — 1縦指以上の沈み'},
        {v:'軟らかい', lc:'',  cls:'cw',tx:'軟らかい — 2縦指以上の沈み'},
      ]);

  var s3 = stepHead('Step 3　前屈位','座位から前に屈んだ状態で評価')
    + numSec('width','⑤','ストーマサイズ（横径）','横径をmm単位で計測','mm','例: 28','縦径との比較で形状確認')
    + selSec('flatness','⑥','外周約4cm以内の皮膚平坦度','ストーマを横から観察し外周4cm以内の形状を分類',[
        {v:'山型',  lc:'ok',cls:'c0',tx:'山型 — 粘膜皮膚接合部が周囲皮膚より突出'},
        {v:'平坦型',lc:'',  cls:'cw',tx:'平坦型 — 粘膜皮膚接合部が周囲皮膚と同じ'},
        {v:'陥凹型',lc:'hv',cls:'cd',tx:'陥凹型 — 粘膜皮膚接合部が周囲皮膚より下がる'},
      ])
    + selSec('wrinkle_nc','⑦','外周約4cm以内の連結しないしわ','ストーマに連結しないしわ・陥凹の深さを計測',[
        {v:'無（0〜4mm）', lc:'ok',cls:'c0',tx:'無 — 0〜4mm'},
        {v:'有（5mm以上）',lc:'hv',cls:'cd',tx:'有 — 5mm以上'},
      ])
    + selSec('wrinkle_c','⑧','外周約4cm以内の連結するしわ','ストーマに連結するしわ・陥凹の深さを計測',[
        {v:'無（0〜2mm）', lc:'ok',cls:'c0',tx:'無 — 0〜2mm'},
        {v:'浅（3〜6mm）', lc:'',  cls:'cw',tx:'浅 — 3〜6mm'},
        {v:'深（7mm以上）',lc:'hv',cls:'cd',tx:'深 — 7mm以上'},
      ]);

  var s4 = stepHead('Step 4　病歴・観察','病歴確認と排泄物・装着状態の観察')
    + selSec('stoma_type','⑨','ストーマの種類','病歴で確認',[
        {v:'結腸ストーマ（単孔式）',      lc:'ok',cls:'c0',tx:'消化管 — 結腸（単孔式）'},
        {v:'結腸ストーマ（双孔式）',      lc:'',  cls:'c1',tx:'消化管 — 結腸（双孔式）'},
        {v:'小腸ストーマ（単孔式）',      lc:'',  cls:'c1',tx:'消化管 — 小腸（単孔式）'},
        {v:'小腸ストーマ（双孔式）',      lc:'',  cls:'c1',tx:'消化管 — 小腸（双孔式）'},
        {v:'尿路ストーマ（ウロストミー）',lc:'',  cls:'c1',tx:'泌尿器 — 尿路（ウロストミー）'},
      ])
    + selSec('discharge','⑩','排泄物の性状','観察',[
        {v:'有形便',    lc:'ok',cls:'c0',tx:'有形便'},
        {v:'軟便・泥状',lc:'',  cls:'cw',tx:'軟便・泥状便'},
        {v:'水様便',    lc:'hv',cls:'cd',tx:'水様便'},
        {v:'尿',        lc:'ok',cls:'c0',tx:'尿（ウロストミー）'},
      ])
    + selSec('wear_stable','⑪','装具の装着安定性','前回交換からの漏れ・装着時間を確認',[
        {v:'安定（3日以上）',           lc:'ok',cls:'c0',tx:'3日以上漏れなく安定'},
        {v:'やや不安定（1〜3日）',       lc:'',  cls:'cw',tx:'1〜3日で交換が必要'},
        {v:'不安定（1日未満・頻回漏れ）',lc:'hv',cls:'cd',tx:'1日未満・頻回の漏れあり'},
      ]);

  return intro + tbar + s1 + s2 + s3 + s4;
}

// ══════════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════════
function buildMain() {
  return CATS.map(cat => `
  <div class="cat" id="cat-${cat.id}" style="--cc:${cat.cc}">
    <div class="cat-hdr" onclick="toggleCat('${cat.id}')">
      <div class="cat-ico">${cat.icon}</div>
      <div class="cat-inf">
        <div class="cat-ttl">${cat.title}</div>
      </div>
      <div class="cat-badges">${cat.badges.map(b=>`<span class="cbadge">${b}</span>`).join('')}</div>
      <span class="chev">▼</span>
    </div>
    <div class="cat-body">
      ${cat.scales.length > 1 ? `<div class="tabs">${cat.scales.map(sid=>`<div class="tab" id="tab-${sid}" onclick="switchTab('${cat.id}','${sid}')">${SCALE_NAMES[sid]}</div>`).join('')}</div>` : ''}
      ${cat.scales.map(sid=>`<div class="pane" id="pane-${sid}"></div>`).join('')}
    </div>
  </div>`).join('');
}

$('main').innerHTML = buildMain();

// スプラッシュ：タップで閉じる
function closeSplash() {
  const sp = $('splash');
  if (sp) sp.classList.add('hidden');
}
</script>
